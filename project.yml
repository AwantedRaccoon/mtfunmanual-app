name: Unmanual

options:
  bundleIdPrefix: com.mtfbook
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: YES
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  Unmanual:
    type: application
    platform: iOS
    sources:
      - path: Unmanual
    info:
      path: Unmanual/Resources/Info.plist
      properties:
        CFBundleDisplayName: Unmanual
        CFBundleName: Unmanual
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIApplicationSupportsIndirectInputEvents: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mtfbook.unmanual
        PRODUCT_NAME: Unmanual
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    scheme:
      testTargets:
        - UnmanualTests
      gatherCoverageData: true

  UnmanualTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: UnmanualTests
    dependencies:
      - target: Unmanual
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mtfbook.unmanual.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Unmanual:
    build:
      targets:
        Unmanual: all
        UnmanualTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - name: UnmanualTests
    archive:
      config: Release
