name: Unmanual

options:
  bundleIdPrefix: com.mtfbook
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: YES
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  Unmanual:
    type: application
    platform: iOS
    sources:
      - path: Unmanual
    info:
      path: Unmanual/Resources/Info.plist
      properties:
        CFBundleDisplayName: Unmanual
        CFBundleName: Unmanual
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIApplicationSupportsIndirectInputEvents: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mtfbook.unmanual
        PRODUCT_NAME: Unmanual
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: Unmanual/Resources/Unmanual.entitlements
        DEVELOPMENT_TEAM: ""
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    scheme:
      testTargets:
        - UnmanualTests
        - UnmanualUITests
      gatherCoverageData: true

  UnmanualTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: UnmanualTests
    dependencies:
      - target: Unmanual
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mtfbook.unmanual.tests
        GENERATE_INFOPLIST_FILE: YES

  UnmanualUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UnmanualUITests
    dependencies:
      - target: Unmanual
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mtfbook.unmanual.uitests
        GENERATE_INFOPLIST_FILE: YES

  UnmanualPerformanceTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: UnmanualPerformanceTests
      - path: UnmanualTests/LegacyUnversionedStoreFactory.swift
    dependencies:
      - target: Unmanual
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mtfbook.unmanual.performance-tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Unmanual:
    build:
      targets:
        Unmanual: all
        UnmanualTests: [test]
        UnmanualUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - name: UnmanualTests
        - name: UnmanualUITests
    archive:
      config: Release

  UnmanualPerformancePreflight:
    build:
      targets:
        Unmanual: all
        UnmanualPerformanceTests: [test]
    test:
      config: Release
      gatherCoverageData: false
      debugEnabled: false
      environmentVariables:
        UNMANUAL_BATCH1_PERF_MODE: simulator-preflight
      targets:
        - name: UnmanualPerformanceTests
          parallelizable: false
          randomExecutionOrder: false
